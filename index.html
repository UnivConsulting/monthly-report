<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="referrer" content="no-referrer" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' data:; connect-src 'self' https://*.supabase.co; frame-src 'self' https://*.supabase.co blob:; object-src 'none'; base-uri 'self'; form-action 'self'" />
  <title>유니브컨설팅 리포트</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;600;700&display=swap" />
  <link rel="stylesheet" href="/assets/style.css" />
</head>
<body>
  <header class="hero">
    <h1>유니브컨설팅 리포트</h1>
  </header>

  <main class="container">
    <!-- 1. ?code= 가 없을 때 -->
    <section id="missing-code" class="card hidden" aria-live="polite">
      <h2>잘못된 접근입니다</h2>
      <p>리포트 링크에 코드가 포함되어 있어야 합니다.</p>
      <p class="muted">안내드린 정확한 링크로 다시 접속해 주세요.</p>
    </section>

    <!-- 2. 비밀번호 입력 -->
    <section id="auth-section" class="card hidden">
      <h2>접속 비밀번호</h2>
      <p class="muted">리포트와 함께 전달드린 비밀번호를 입력해 주세요.</p>

      <form id="auth-form" autocomplete="off" novalidate>
        <label class="sr-only" for="password">비밀번호</label>
        <input
          id="password"
          name="password"
          type="password"
          required
          autocomplete="one-time-code"
          placeholder="비밀번호"
          aria-describedby="error-msg"
        />
        <button type="submit" id="submit-btn">리포트 열기</button>
        <p id="error-msg" class="error hidden" role="alert"></p>
      </form>
    </section>

    <!-- 3. 리포트 뷰어 -->
    <section id="viewer-section" class="viewer hidden" aria-live="polite">
      <div class="viewer-header">
        <div class="viewer-meta">
          <p class="muted small" id="student-name"></p>
          <h2 id="report-title">리포트</h2>
        </div>
        <a
          id="download-link"
          href="#"
          target="_blank"
          rel="noopener"
          class="btn-secondary"
        >새 창에서 열기</a>
      </div>
      <div class="viewer-frame-wrap">
        <iframe
          id="pdf-frame"
          title="리포트 PDF"
          referrerpolicy="no-referrer"
        ></iframe>
      </div>
    </section>

    <!-- 로딩 오버레이 -->
    <div id="loading" class="loading hidden" aria-live="polite">
      <span class="spinner" aria-hidden="true"></span>
      <span>확인 중…</span>
    </div>
  </main>

  <script src="/assets/config.js" defer></script>
  <script src="/assets/app.js" defer></script>
</body>
</html>
